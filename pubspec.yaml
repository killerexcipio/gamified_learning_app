name: rebelbase_flutter_demo
version: 1.0.0+1
publish_to: none
description: Demo-grade Flutter Android app for a RebelBase-style social project builder platform.

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # flutter_riverpod: ^3.3.1
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  supabase_flutter: ^2.12.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.2.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
